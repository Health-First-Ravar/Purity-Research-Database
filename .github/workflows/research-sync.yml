name: Research Auto-Sync

on:
  schedule:
    - cron: '0 11 * * *'    # daily 11:00 UTC (after COA sync)
  workflow_dispatch:
    inputs:
      force_embed:
        description: 'Re-embed the entire knowledge base (ignore incremental)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: research-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authenticate to Google (WIF, no key)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Install Node deps
        working-directory: dashboard/app
        run: npm ci

      - name: Pull new research papers from Drive
        env:
          DRIVE_RESEARCH_FOLDER_ID: ${{ vars.DRIVE_RESEARCH_FOLDER_ID }}
        run: python3 scripts/pull-new-research.py

      - name: Embed knowledge base into chunks
        working-directory: dashboard/app
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VOYAGE_API_KEY: ${{ secrets.VOYAGE_API_KEY }}
        run: npm run ingest

      - name: Refresh bibliography catalog
        working-directory: dashboard/app
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        continue-on-error: true
        run: npm run import-bibliography

      # --- Open a PR instead of pushing straight to main ---
      # Uses BOT_PAT so the PR's events trigger CI (GITHUB_TOKEN does not).
      - name: Open / update sync PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.BOT_PAT }}
          add-paths: |
            knowledge-base/research
          branch: auto/research-sync
          delete-branch: true
          commit-message: "Research auto-sync ${{ github.run_number }}"
          title: "Research auto-sync"
          body: |
            Automated research-paper pull + embed + bibliography refresh.
            Auto-merges once CI is green.
          labels: automation

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"
