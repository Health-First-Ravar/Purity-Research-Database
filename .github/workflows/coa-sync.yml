name: COA Auto-Sync

on:
  schedule:
    - cron: '0 */6 * * *'   # every 6 hours (UTC)
  workflow_dispatch:
    inputs:
      force:
        description: 'Re-parse ALL COAs (ignore hashes) — use after a parser change'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write       # open/auto-merge the sync PR
  id-token: write            # Workload Identity Federation

concurrency:
  group: coa-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Authenticate to Google (WIF, no key)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Install Node deps
        working-directory: dashboard/app
        run: npm ci

      - name: Pull new COAs from Drive
        env:
          DRIVE_COA_FOLDER_ID: ${{ vars.DRIVE_COA_FOLDER_ID }}
        run: python3 scripts/pull-new-coas.py

      - name: Parse new COAs
        # A per-file parse error must not abort the whole pipeline.
        continue-on-error: true
        run: python3 scripts/ingest.py ${{ inputs.force && '--force' || '' }}

      - name: Import to database
        working-directory: dashboard/app
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run import-coas

      # --- Open a PR instead of pushing straight to main ---
      # Uses BOT_PAT (a fine-grained PAT) so the PR's events trigger CI.
      # The default GITHUB_TOKEN deliberately does NOT trigger workflows.
      - name: Open / update sync PR
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.BOT_PAT }}
          add-paths: |
            COAs
            Processed
            _NotCOA
            logs
            index.json
          branch: auto/coa-sync
          delete-branch: true
          commit-message: "COA auto-sync ${{ github.run_number }}"
          title: "COA auto-sync"
          body: |
            Automated COA pull → parse → import.
            Auto-merges once CI is green. Open the Files tab to review the diff.
          labels: automation

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.BOT_PAT }}
        run: gh pr merge --squash --auto "${{ steps.cpr.outputs.pull-request-number }}"
